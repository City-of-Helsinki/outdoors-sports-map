<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sledding Icon Test</title>
  <link rel="stylesheet" href="./sledding-icon.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 50px;
    }
    .icon {
      font-size: 48px;
      color: #333;
      margin: 20px;
    }
  </style>
</head>
<body>
  <h1>Sledding Icon Font Test</h1>

  <!-- Test using the CSS class -->
  <div>
    <p>Using CSS class:</p>
    <span class="icon icon-sledding"></span>
  </div>

  <!-- Test using the Unicode character -->
  <div>
    <p>Using Unicode character:</p>
    <span class="icon" style="font-family: 'sledding-icon';">&#xe900;</span>
  </div>

  <!-- Test with plain text -->
  <div>
    <p>Plain text with font-family:</p>
    <span style="font-family: 'sledding-icon'; font-size: 48px;">&#xe900;</span>
  </div>
</body>
</html>
